<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Experience & Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset & Variables synced with index.html */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        :root { 
            --bg-color: #050505; 
            --text-main: #ffffff; 
            --text-muted: #888888;
            --purple-glow: rgba(139, 92, 246, 0.4); 
            --card-bg: rgba(15, 15, 15, 0.6); 
            --border-color: rgba(255, 255, 255, 0.05);
            --card-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }

        body.light-mode { 
            --bg-color: #f5f5f5; 
            --text-main: #111111; 
            --text-muted: #555555;
            --card-bg: rgba(255, 255, 255, 0.6); 
            --border-color: rgba(0, 0, 0, 0.1); 
            --purple-glow: rgba(139, 92, 246, 0.15); /* Softer orb for light mode */
            --card-shadow: none;
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* The shared Glow Orb background from index.html */
        .glow-orb { 
            position: fixed; 
            top: 40%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            width: 500px; 
            height: 500px; 
            background: var(--purple-glow); 
            filter: blur(150px); 
            border-radius: 50%; 
            z-index: 0; 
            pointer-events: none;
            transition: background 0.3s ease;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            padding: 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 { 
            color: #8b5cf6; 
            margin-bottom: 2rem; 
            text-transform: uppercase;
            font-weight: 800;
        }       

        .btn { 
            color: var(--text-main); 
            text-decoration: none; 
            border: 1px solid var(--border-color); 
            padding: 10px 20px; 
            border-radius: 5px; 
            display: inline-block;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(5px);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .btn:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }

        .list-section { margin-top: 3rem; }
        
        .item-card { 
            background: var(--card-bg); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.5rem; 
            margin-bottom: 1rem; 
            border-radius: 8px; 
            border: 1px solid var(--border-color); 
            transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-3px);
            border-color: rgba(139, 92, 246, 0.4);
        }

        .item-card h3 { 
            margin-bottom: 0.5rem; 
            color: var(--text-main);
            text-shadow: var(--card-shadow);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }
        
        .item-card span { 
            font-size: 0.8rem; 
            color: #8b5cf6; 
            display: block; 
            margin-bottom: 1rem; 
            font-weight: 600;
        }

        .item-card p {
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="glow-orb"></div>

    <div class="content-wrapper">
        <div class="header-actions">
            <a href="index.html" class="btn">← Back to Portfolio</a>
            <button id="theme-toggle" class="btn">☀️ Light Mode</button>
        </div>
        
        <div class="list-section">
            <h1>Internships</h1>
            <div id="internships-list">Loading...</div>
        </div>

        <div class="list-section">
            <h1>Projects</h1>
            <div id="projects-list">Loading...</div>
        </div>

        <div class="list-section">
            <h1>Courses</h1>
            <div id="courses-list">Loading...</div>
        </div>
    </div>

    <script>
        // --- Theme Sync Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // Use the exact same "theme" key that index.html uses!
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'light') {
            body.classList.add('light-mode');
            themeToggleBtn.innerText = '🌙 Dark Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('light-mode');
            
            if (body.classList.contains('light-mode')) {
                localStorage.setItem('theme', 'light');
                themeToggleBtn.innerText = '🌙 Dark Mode';
            } else {
                localStorage.setItem('theme', 'dark');
                themeToggleBtn.innerText = '☀️ Light Mode';
            }
        });

        // --- Data Fetching & Smart Sorting Logic ---
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                // --- THE SMART DATE EXTRACTOR (Rightmost Date) ---
                const extractDate = (subtitle) => {
                    if (!subtitle) return 0; // If empty, push to bottom
                    
                    const dateMatches = subtitle.match(/(\d{1,2}\s+[a-zA-Z]{3,}\s+\d{4})/g);
                    if (dateMatches && dateMatches.length > 0) {
                        const lastDate = dateMatches[dateMatches.length - 1];
                        return new Date(lastDate).getTime();
                    }
                    
                    const yearMatches = subtitle.match(/\b(20\d{2})\b/g);
                    if (yearMatches && yearMatches.length > 0) {
                        const lastYear = yearMatches[yearMatches.length - 1];
                        return new Date(lastYear, 0, 1).getTime();
                    }
                    
                    return 0; 
                };

                const sortNewestToOldest = (array) => {
                    if (!array) return [];
                    return array.sort((a, b) => extractDate(b.subtitle) - extractDate(a.subtitle));
                };
                
                const renderList = (array, elementId) => {
                    const container = document.getElementById(elementId);
                    if (!array || array.length === 0) {
                        container.innerHTML = "<p style='color: var(--text-muted);'>Nothing added yet.</p>";
                        return;
                    }
                    container.innerHTML = array.map(item => {
                        let linkHTML = '';
                        if (item.link) {
                            const fixedUrl = item.link.startsWith('http') ? item.link : 'https://' + item.link;
                            linkHTML = `<a href="${fixedUrl}" target="_blank" style="display: inline-block; margin-top: 15px; color: #8b5cf6; text-decoration: none; border-bottom: 1px solid #8b5cf6; word-break: break-all; transition: opacity 0.3s;">${item.link}</a>`;                    
                        }

                        return `
                            <div class="item-card">
                                <h3>${item.title}</h3>
                                <span>${item.subtitle || ''}</span>
                                <p>${item.description}</p>
                                ${linkHTML}
                            </div>
                        `;
                    }).join('');
                };

                // Render the sorted arrays
                renderList(sortNewestToOldest(data.internships), 'internships-list');
                renderList(sortNewestToOldest(data.projects), 'projects-list');
                renderList(sortNewestToOldest(data.courses), 'courses-list');
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('internships-list').innerHTML = "<p style='color: #ff5555;'>Failed to load data. Ensure your server is running.</p>";
                document.getElementById('projects-list').innerHTML = "";
                document.getElementById('courses-list').innerHTML = "";
            }
        }
        
        loadData();
    </script>
</body>
</html>
