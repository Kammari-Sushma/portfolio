<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Experience & Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* The Animated Gradient Background Container (Dark Mode Default) */
        #vanta-bg {
            position: fixed;
            z-index: 0;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            transition: background 0.5s ease;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Content Wrapper */
        body { 
            color: white; 
            font-family: 'Inter', sans-serif; 
            background: transparent;
            transition: color 0.3s ease;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            padding: 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Header Container for Back & Theme Buttons */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 { 
            color: #e5b1ef; 
            margin-bottom: 2rem; 
            text-shadow: 
                0 0 10px rgba(139, 92, 246, 0.8), 
                0 0 20px rgba(139, 92, 246, 0.6), 
                0 0 40px rgba(139, 92, 246, 0.4); 
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }       

        .btn { 
            color: white; 
            text-decoration: none; 
            border: 1px solid rgba(255,255,255,0.3); 
            padding: 10px 20px; 
            border-radius: 5px; 
            display: inline-block;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
        }

        .btn:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }

        .list-section { margin-top: 3rem; }
        
        .item-card { 
            background: rgba(15, 15, 15, 0.6); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.5rem; 
            margin-bottom: 1rem; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: transform 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-3px);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .item-card h3 { 
            margin-bottom: 0.5rem; 
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }
        
        .item-card span { 
            font-size: 0.8rem; 
            color: #8b5cf6; 
            display: block; 
            margin-bottom: 1rem; 
        }

        /* =========================================
           LIGHT THEME OVERRIDES
           ========================================= */
        body.light-theme {
            color: #1f2937; /* Dark gray text */
        }

        body.light-theme #vanta-bg {
            /* Soft pastel gradient for light mode */
            background: linear-gradient(-45deg, #fbc2eb, #a18cd1, #e0c3fc, #8ec5fc);
            background-size: 400% 400%;
        }

        body.light-theme h1 {
            color: #5b21b6; /* Deep purple */
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8); /* Soft white glow */
        }

        body.light-theme .btn {
            color: #1f2937;
            background: rgba(255, 255, 255, 0.4);
            border-color: rgba(0, 0, 0, 0.1);
        }

        body.light-theme .btn:hover {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.8);
        }

        body.light-theme .item-card {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        body.light-theme .item-card:hover {
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.8);
        }

        body.light-theme .item-card h3 {
            color: #111827;
            text-shadow: none;
        }

        body.light-theme .item-card span {
            color: #6d28d9;
        }
    </style>
</head>
<body>
    <div id="vanta-bg"></div>

    <div class="content-wrapper">
        <div class="header-actions">
            <a href="index.html" class="btn">← Back to Portfolio</a>
            <button id="theme-toggle" class="btn">☀️ Light Mode</button>
        </div>
        
        <div class="list-section">
            <h1>Internships</h1>
            <div id="internships-list">Loading...</div>
        </div>

        <div class="list-section">
            <h1>Projects</h1>
            <div id="projects-list">Loading...</div>
        </div>

        <div class="list-section">
            <h1>Courses</h1>
            <div id="courses-list">Loading...</div>
        </div>
    </div>

    <script>
        // --- Theme Toggle Logic ---
        const themeToggleBtn = document.getElementById('theme-toggle');
        const body = document.body;

        // Check local storage for saved theme preference
        const savedTheme = localStorage.getItem('portfolio-theme');
        if (savedTheme === 'light') {
            body.classList.add('light-theme');
            themeToggleBtn.innerText = '🌙 Dark Mode';
        }

        themeToggleBtn.addEventListener('click', () => {
            body.classList.toggle('light-theme');
            
            if (body.classList.contains('light-theme')) {
                localStorage.setItem('portfolio-theme', 'light');
                themeToggleBtn.innerText = '🌙 Dark Mode';
            } else {
                localStorage.setItem('portfolio-theme', 'dark');
                themeToggleBtn.innerText = '☀️ Light Mode';
            }
        });

        // --- Data Fetching & Smart Sorting Logic ---
        async function loadData() {
            try {
                const res = await fetch('/api/data');
                const data = await res.json();
                
                // --- THE SMART DATE EXTRACTOR ---
                const extractDate = (subtitle) => {
                    if (!subtitle) return 0; // If empty, push to bottom
                    
                    // 1. Look for a full date like "11 Nov 2022" or "1 Jul 2024"
                    const dateMatch = subtitle.match(/(\d{1,2}\s+[a-zA-Z]{3,}\s+\d{4})/);
                    if (dateMatch) return new Date(dateMatch[0]).getTime();
                    
                    // 2. Fallback: Look for just a year like "2023" or "2025-26"
                    const yearMatch = subtitle.match(/\b(20\d{2})\b/);
                    if (yearMatch) return new Date(yearMatch[1], 0, 1).getTime(); // Defaults to Jan 1st of that year
                    
                    // 3. No date found (e.g., "Microsoft | Coursera")
                    return 0; 
                };

                const sortNewestToOldest = (array) => {
                    if (!array) return [];
                    return array.sort((a, b) => extractDate(b.subtitle) - extractDate(a.subtitle));
                };
                
                const renderList = (array, elementId) => {
                    const container = document.getElementById(elementId);
                    if (!array || array.length === 0) {
                        container.innerHTML = "<p style='color: #888;'>Nothing added yet.</p>";
                        return;
                    }
                    container.innerHTML = array.map(item => {
                        let linkHTML = '';
                        if (item.link) {
                            const fixedUrl = item.link.startsWith('http') ? item.link : 'https://' + item.link;
                            linkHTML = `<a href="${fixedUrl}" target="_blank" style="display: inline-block; margin-top: 15px; color: #8b5cf6; text-decoration: none; border-bottom: 1px solid #8b5cf6; word-break: break-all; transition: opacity 0.3s;">${item.link}</a>`;                    
                        }

                        return `
                            <div class="item-card">
                                <h3>${item.title}</h3>
                                <span>${item.subtitle || ''}</span>
                                <p>${item.description}</p>
                                ${linkHTML}
                            </div>
                        `;
                    }).join('');
                };

                // Render the sorted arrays
                renderList(sortNewestToOldest(data.internships), 'internships-list');
                renderList(sortNewestToOldest(data.projects), 'projects-list');
                renderList(sortNewestToOldest(data.courses), 'courses-list');
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('internships-list').innerHTML = "<p style='color: #ff5555;'>Failed to load data. Ensure your server is running.</p>";
                document.getElementById('projects-list').innerHTML = "";
                document.getElementById('courses-list').innerHTML = "";
            }
        }
        
        loadData();
    </script>
</body>
</html>
