<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Experience & Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>

    <style>
        /* Base Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        /* The 3D Background Container */
        #vanta-bg {
            position: fixed;
            z-index: 0;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
        }

        /* Content Wrapper to sit above the background */
        body { 
            color: white; 
            font-family: 'Inter', sans-serif; 
            background: transparent; /* Changed from solid black */
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            padding: 5%;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 { 
            color: #e5b1ef; 
            margin-bottom: 2rem; 
            text-shadow: 
                0 0 10px rgba(139, 92, 246, 0.8), 
                0 0 20px rgba(139, 92, 246, 0.6), 
                0 0 40px rgba(139, 92, 246, 0.4); 
        }       

        .back-btn { 
            color: white; 
            text-decoration: none; 
            border: 1px solid rgba(255,255,255,0.3); 
            padding: 10px 20px; 
            border-radius: 5px; 
            display: inline-block;
            transition: all 0.3s ease;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
        }

        .back-btn:hover {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.1);
        }

        .list-section { margin-top: 3rem; }
        
        .item-card { 
            /* Added backdrop-filter for an elegant "glassmorphism" look over the 3D background */
            background: rgba(15, 15, 15, 0.6); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 1.5rem; 
            margin-bottom: 1rem; 
            border-radius: 8px; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-3px);
            border-color: rgba(139, 92, 246, 0.3);
        }

        .item-card h3 { 
            margin-bottom: 0.5rem; 
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
        }
        .item-card span { font-size: 0.8rem; color: #8b5cf6; display: block; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div id="vanta-bg"></div>

    <div class="content-wrapper">
        <a href="index.html" class="back-btn">← Back to Portfolio</a>
        
        <div class="list-section">
            <h1>Internships</h1>
            <div id="internships-list">Loading...</div>
        </div>

        <div class="list-section">
            <h1>Projects</h1>
            <div id="projects-list">Loading...</div>
        </div>

        <div class="list-section">
            <h1>Courses</h1>
            <div id="courses-list">Loading...</div>
        </div>
    </div>

    <script>
        // Initialize the 3D Background
        VANTA.NET({
            el: "#vanta-bg",
            mouseControls: true,
            touchControls: true,
            gyroControls: false,
            minHeight: 200.00,
            minWidth: 200.00,
            scale: 1.00,
            scaleMobile: 1.00,
            color: 0x8b5cf6,       // Your purple accent color
            backgroundColor: 0x050505, // Your dark background color
            points: 12.00,
            maxDistance: 22.00,
            spacing: 18.00
        });

        // Your original data fetching logic
        async function loadData() {
            try {
                const res = await fetch('http://localhost:3000/api/data');
                const data = await res.json();
                
                const renderList = (array, elementId) => {
                    const container = document.getElementById(elementId);
                    if (!array || array.length === 0) {
                        container.innerHTML = "<p style='color: #888;'>Nothing added yet.</p>";
                        return;
                    }
                    container.innerHTML = array.map(item => {
                        let linkHTML = '';
                        if (item.link) {
                            const fixedUrl = item.link.startsWith('http') ? item.link : 'https://' + item.link;
                            linkHTML = `<a href="${fixedUrl}" target="_blank" style="display: inline-block; margin-top: 15px; color: #8b5cf6; text-decoration: none; border-bottom: 1px solid #8b5cf6; word-break: break-all; transition: opacity 0.3s;">${item.link}</a>`;                    
                        }

                        return `
                            <div class="item-card">
                                <h3>${item.title}</h3>
                                <span>${item.subtitle || ''}</span>
                                <p>${item.description}</p>
                                ${linkHTML}
                            </div>
                        `;
                    }).join('');
                };

                renderList(data.internships, 'internships-list');
                renderList(data.projects, 'projects-list');
                renderList(data.courses, 'courses-list');
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('internships-list').innerHTML = "<p style='color: #ff5555;'>Failed to load data. Ensure your server is running.</p>";
                document.getElementById('projects-list').innerHTML = "";
                document.getElementById('courses-list').innerHTML = "";
            }
        }
        loadData();
    </script>
</body>
</html>
